<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตั้งค่าระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    :root {
      --bg-start: #f0f7f0;
      --bg-mid: #e8f4e8;
      --bg-end: #ddeedd;
      --primary: #3a7d44;
      --primary-light: #5a9e64;
      --primary-pale: #d4edda;
      --accent: #8fbc8f;
      --text-dark: #2d4a2d;
      --text-mid: #4a7055;
      --text-light: #7a9e7a;
      --text-muted: #a0b8a0;
      --surface: rgba(255,255,255,0.78);
      --surface-border: rgba(58,125,68,0.13);
      --shadow-soft: 0 4px 24px rgba(58,125,68,0.09);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.45s ease;
    }

    /* Header */
    .page-header { margin-bottom: 26px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-light); text-decoration: none; font-size: 0.86em;
      padding: 6px 14px; border-radius: 20px;
      background: rgba(58,125,68,0.08);
      border: 1px solid rgba(58,125,68,0.15);
      transition: all 0.25s ease;
      margin-bottom: 16px;
    }
    .back-btn:hover { background: rgba(58,125,68,0.15); color: var(--primary); }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55em;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    .page-subtitle { font-size: 0.82em; color: var(--text-light); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 24px 22px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft);
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(58,125,68,0.1);
    }
    .section-icon {
      width: 36px; height: 36px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .section-icon.green { background: rgba(58,125,68,0.12); }
    .section-icon.teal  { background: rgba(90,158,100,0.12); }
    .section-title-text { font-weight: 700; font-size: 0.93em; color: var(--text-dark); }

    label {
      display: block; font-size: 0.80em; font-weight: 700;
      color: var(--text-mid); margin-bottom: 6px; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(58,125,68,0.04);
      border: 1.5px solid rgba(58,125,68,0.18);
      border-radius: 12px;
      color: var(--text-dark);
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: all 0.25s ease;
      margin-bottom: 14px;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--primary);
      background: rgba(58,125,68,0.06);
      box-shadow: 0 0 0 3px rgba(58,125,68,0.10);
    }
    .note {
      font-size: 0.77em; color: var(--text-muted);
      margin-top: -10px; margin-bottom: 14px; line-height: 1.5;
    }

    .btn {
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700;
      padding: 13px; width: 100%;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-get-loc {
      background: linear-gradient(135deg, #5a9e64, #78b578);
      color: white;
      box-shadow: 0 4px 14px rgba(90,158,100,0.28);
      margin-bottom: 18px;
    }
    .btn-get-loc:hover {
      box-shadow: 0 6px 22px rgba(90,158,100,0.4);
      transform: translateY(-1px);
    }
    .btn-save {
      background: linear-gradient(135deg, #3a7d44, #5a9e64);
      color: white;
      box-shadow: 0 4px 18px rgba(58,125,68,0.28);
      font-size: 16px; padding: 15px;
    }
    .btn-save:hover {
      box-shadow: 0 8px 28px rgba(58,125,68,0.4);
      transform: translateY(-2px);
    }
    .btn-back {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px; width: 100%; border-radius: 12px;
      background: transparent;
      border: 1.5px solid rgba(58,125,68,0.2);
      color: var(--text-light); font-size: 15px; font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      text-decoration: none; cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 10px;
    }
    .btn-back:hover { color: var(--primary); border-color: var(--primary); background: rgba(58,125,68,0.05); }

    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    #msg {
      margin-top: 14px; min-height: 22px;
      font-size: 0.9em; font-weight: 700;
      text-align: center;
    }
    .msg-success { color: #2e7d32; }
    .msg-error   { color: #c62828; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <a href="index.html" class="back-btn">← กลับ</a>
    <h2>⚙️ ตั้งค่าระบบ</h2>
    <p class="page-subtitle">จัดการ API และจุดเช็คอิน GPS</p>
  </div>

  <div class="card">
    <div class="section-header">
      <div class="section-icon green">🔗</div>
      <span class="section-title-text">Google Apps Script API</span>
    </div>
    <label>WEB APP URL</label>
    <input type="url" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <p class="note">Deploy GAS แล้วนำ URL มาวางที่นี่ (Execute as: Me / Anyone can access)</p>
  </div>

  <div class="card">
    <div class="section-header">
      <div class="section-icon teal">📍</div>
      <span class="section-title-text">จุดเช็คอิน GPS</span>
    </div>
    <button class="btn btn-get-loc" onclick="getCurrentLocation()">
      📍 ดึงตำแหน่งปัจจุบันของฉัน
    </button>
    <div class="input-row">
      <div>
        <label>Latitude</label>
        <input type="number" step="any" id="lat" placeholder="13.7563">
      </div>
      <div>
        <label>Longitude</label>
        <input type="number" step="any" id="lng" placeholder="100.5018">
      </div>
    </div>
    <label>รัศมีที่ยอมรับ (กิโลเมตร)</label>
    <input type="number" step="0.01" id="radius" placeholder="เช่น 0.1 คือ 100 เมตร">
    <p class="note">* ใส่ 0 หากไม่ต้องการจำกัดพื้นที่</p>
  </div>

  <button class="btn btn-save" onclick="saveAll()">💾 บันทึกการตั้งค่าทั้งหมด</button>
  <div id="msg"></div>
  <a href="index.html" class="btn-back">← กลับเมนูหลัก</a>

</div>
<script>
  const msgDiv = document.getElementById('msg');

  window.onload = function() {
    const savedUrl = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '');
    document.getElementById('apiUrl').value = savedUrl;
    if (savedUrl) loadGpsConfig(savedUrl);
  };

  function loadGpsConfig(apiUrl) {
    fetch(apiUrl + '?action=getConfig')
      .then(r => r.json())
      .then(config => {
        document.getElementById('lat').value    = config.lat    || '';
        document.getElementById('lng').value    = config.lng    || '';
        document.getElementById('radius').value = config.radius || '0.5';
      })
      .catch(() => {});
  }

  function getCurrentLocation() {
    if (!navigator.geolocation) return alert('Browser นี้ไม่รองรับ Geolocation');
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('lat').value = pos.coords.latitude;
        document.getElementById('lng').value = pos.coords.longitude;
        alert('✅ ดึงพิกัดเรียบร้อย');
      },
      err => alert('❌ ไม่สามารถดึงตำแหน่งได้: ' + err.message)
    );
  }

  async function saveAll() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    const lat    = document.getElementById('lat').value;
    const lng    = document.getElementById('lng').value;
    const radius = document.getElementById('radius').value;

    if (!apiUrl) return showMsg('❌ กรุณากรอก API URL', 'error');
    if (!lat || !lng || !radius) return showMsg('❌ กรุณากรอกข้อมูล GPS ให้ครบ', 'error');

    localStorage.setItem('gasApiUrl', apiUrl);
    showMsg('⏳ กำลังบันทึก...', '');

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveConfig', lat, lng, radius })
      });
      const data = await res.json();
      showMsg('✅ ' + (data.message || 'บันทึกสำเร็จ'), 'success');
    } catch (e) {
      showMsg('❌ เชื่อมต่อ API ไม่ได้: ' + e.message, 'error');
    }
  }

  function showMsg(text, type) {
    msgDiv.innerText = text;
    msgDiv.className = type === 'success' ? 'msg-success' : type === 'error' ? 'msg-error' : '';
  }
</script>
</body>
</html>
