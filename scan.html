<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root {
      --bg-start: #f0f7f0;
      --bg-mid: #e8f4e8;
      --bg-end: #ddeedd;
      --primary: #3a7d44;
      --primary-light: #5a9e64;
      --text-dark: #2d4a2d;
      --text-light: #7a9e7a;
      --text-muted: #a0b8a0;
      --surface: rgba(255,255,255,0.78);
      --surface-border: rgba(58,125,68,0.13);
      --shadow-soft: 0 4px 24px rgba(58,125,68,0.09);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
      overflow-x: hidden;
    }

    .page-wrap {
      width: 100%; max-width: 560px;
      animation: fadeIn 0.45s ease;
      display: flex; flex-direction: column; align-items: center;
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 16px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-light); text-decoration: none; font-size: 0.85em;
      padding: 6px 14px; border-radius: 20px;
      background: rgba(58,125,68,0.08);
      border: 1px solid rgba(58,125,68,0.15);
      transition: all 0.25s ease;
    }
    .back-btn:hover { background: rgba(58,125,68,0.15); color: var(--primary); }

    h2 { font-size: 1.05em; font-weight: 700; color: var(--text-dark); }
    .spacer { width: 80px; }

    /* Status */
    .status-area { width: 100%; text-align: center; margin-bottom: 14px; }
    #main-status {
      font-size: 0.88em; color: var(--text-light);
      min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #gps-status {
      font-size: 0.79em; color: var(--text-muted); margin-top: 6px; min-height: 18px;
    }

    /* GPS Alert */
    .gps-alert {
      display: none;
      background: #fdecea;
      border: 1px solid #f5c6cb;
      border-left: 4px solid #c62828;
      color: #7b1f1f;
      border-radius: 12px; padding: 12px 16px;
      width: 100%; margin-bottom: 12px;
      font-size: 0.87em; font-weight: 600;
      text-align: center;
    }

    /* Video */
    .video-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #e0ede0;
      border: 2px solid rgba(58,125,68,0.22);
      box-shadow: 0 8px 32px rgba(58,125,68,0.14);
      min-height: 280px;
    }
    video {
      width: 100%; height: auto; display: block;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s ease;
      border-radius: 18px;
    }
    video.active { opacity: 1; }

    /* Scanner frame corners */
    .scanner-frame { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--primary);
      border-style: solid;
      opacity: 0.7;
    }
    .corner-tl { top: 14px;    left: 14px;   border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 14px;    right: 14px;  border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 14px; left: 14px;   border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 14px; right: 14px;  border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute; left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 8px rgba(58,125,68,0.7);
      z-index: 6;
      animation: scanMove 2s ease-in-out infinite;
    }
    .scan-line.active { display: block; }

    #overlay-status {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      color: var(--text-dark);
      padding: 6px 18px; border-radius: 30px;
      z-index: 10; white-space: nowrap; font-size: 0.83em; font-weight: 600;
      border: 1px solid rgba(58,125,68,0.2);
      box-shadow: 0 2px 10px rgba(58,125,68,0.12);
    }

    /* Start Button */
    #btnStart {
      display: none;
      background: linear-gradient(135deg, #3a7d44, #5a9e64);
      color: white; border: none; border-radius: 50px;
      padding: 16px 44px; font-size: 18px; font-weight: 700;
      cursor: pointer; font-family: 'Sarabun', sans-serif;
      box-shadow: 0 4px 22px rgba(58,125,68,0.35);
      margin: 20px auto 0;
      transition: all 0.3s ease;
      animation: btnPulse 2.2s ease-in-out infinite;
    }
    #btnStart:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(58,125,68,0.5);
      animation: none;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0;
      background: rgba(45,74,45,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: linear-gradient(160deg, #ffffff 0%, #f0f7f0 100%);
      border: 1px solid rgba(58,125,68,0.18);
      padding: 32px 28px;
      border-radius: 24px;
      width: 88%; max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(58,125,68,0.18);
      display: flex; flex-direction: column; align-items: center;
      animation: modalSlideUp 0.35s ease;
    }
    .modal-avatar {
      font-size: 52px;
      background: rgba(58,125,68,0.1);
      border: 2px solid rgba(58,125,68,0.25);
      border-radius: 50%;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .modal-title { font-size: 0.81em; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .user-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--primary); font-weight: 600;
      margin-bottom: 12px;
    }
    .time-badge {
      background: rgba(58,125,68,0.1);
      border: 1px solid rgba(58,125,68,0.25);
      color: var(--primary);
      padding: 8px 22px; border-radius: 30px;
      font-size: 15px; font-weight: 700;
      margin-bottom: 6px;
    }
    .score-text { color: var(--text-muted); font-size: 13px; margin-bottom: 22px; }

    .btn {
      border: none; border-radius: 14px; cursor: pointer; width: 100%;
      margin: 5px 0; font-family: 'Sarabun', sans-serif;
      transition: all 0.25s ease;
    }
    .btn-confirm {
      background: linear-gradient(135deg, #3a7d44, #5a9e64);
      color: white;
      padding: 17px; font-size: 20px; font-weight: 700;
      box-shadow: 0 4px 18px rgba(58,125,68,0.3);
      margin-bottom: 10px;
    }
    .btn-confirm:hover:not(:disabled) {
      box-shadow: 0 8px 28px rgba(58,125,68,0.45);
      transform: translateY(-1px);
    }
    .btn-confirm:disabled { opacity: 0.6; cursor: default; }
    .btn-cancel {
      background: transparent;
      border: 1.5px solid rgba(58,125,68,0.2);
      color: var(--text-light);
      padding: 13px; font-size: 16px;
    }
    .btn-cancel:hover { background: rgba(58,125,68,0.05); border-color: var(--primary); color: var(--primary); }

    @keyframes fadeIn      { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scanMove    { 0%,100% { top: 15%; } 50% { top: 78%; } }
    @keyframes btnPulse    { 0%,100% { box-shadow: 0 4px 22px rgba(58,125,68,0.35); } 50% { box-shadow: 0 4px 32px rgba(58,125,68,0.55); } }
    @keyframes modalSlideUp{ from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse       { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: 0.6; } }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <h2>📷 สแกนเข้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="status-area">
    <div id="main-status">⏳ กำลังเริ่มต้น...</div>
    <div id="gps-status"></div>
  </div>

  <div id="gps-alert-box" class="gps-alert">
    ⛔ คุณอยู่นอกพื้นที่ที่กำหนด — ไม่สามารถเช็คอินได้
  </div>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div id="overlay-status">รอโหลด...</div>
  </div>

  <button id="btnStart" onclick="startCamera()">🚀 เริ่มสแกน</button>

</div>

<!-- Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-content">
    <div class="modal-avatar">👤</div>
    <p class="modal-title">ตรวจพบใบหน้า</p>
    <p class="user-name" id="modalName">—</p>
    <div class="time-badge" id="modalTime">—</div>
    <p class="score-text" id="modalScore"></p>
    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ยกเลิก / สแกนใหม่</button>
  </div>
</div>

<script>
  const API_URL        = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '');
  const video          = document.getElementById('video');
  const mainStatus     = document.getElementById('main-status');
  const overlayStatus  = document.getElementById('overlay-status');
  const confirmModal   = document.getElementById('confirmModal');
  const gpsStatus      = document.getElementById('gps-status');
  const gpsAlertBox    = document.getElementById('gps-alert-box');
  const btnStart       = document.getElementById('btnStart');

  const MATCH_THRESHOLD = 0.45;
  let knownFaces   = [];
  let scanInterval = null;
  let currentMatch = null;
  let currentLat   = null;
  let currentLng   = null;

  if (!API_URL) {
    showError('ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#b07d00">ไปตั้งค่า</a>');
  } else {
    window.addEventListener('load', init);
  }

  async function init() {
    try {
      mainStatus.innerText = '1/4 ตรวจสอบ GPS...';
      await checkGPS();
    } catch (e) {
      showError(e.message);
    }
  }

  function checkGPS() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Browser ไม่รองรับ GPS')); return; }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          try {
            const config = await fetch(API_URL + '?action=getConfig').then(r => r.json());
            if (!config.lat || !config.lng || config.radius == 0) {
              gpsStatus.innerHTML = '<span style="color:#2e7d32">📍 GPS: ไม่จำกัดพื้นที่</span>';
              resolve(); initFaceSystem(); return;
            }
            const dist = haversineKm(currentLat, currentLng, config.lat, config.lng);
            if (dist <= config.radius) {
              gpsStatus.innerHTML = '<span style="color:#2e7d32">📍 GPS: OK (ห่างเป้าหมาย ' + dist.toFixed(3) + ' km)</span>';
              resolve(); initFaceSystem();
            } else {
              gpsStatus.innerHTML = '<span style="color:#c62828">📍 GPS: ห่างเกินไป (' + dist.toFixed(3) + ' km / กำหนด ' + config.radius + ' km)</span>';
              gpsAlertBox.style.display = 'block';
              mainStatus.innerText = '⛔ ไม่อนุญาตให้สแกน';
              overlayStatus.innerText = 'Out of Range';
            }
          } catch (e) { reject(new Error('เชื่อมต่อ API ไม่ได้: ' + e.message)); }
        },
        () => reject(new Error('กรุณาเปิด GPS (Location Service)'))
      );
    });
  }

  async function initFaceSystem() {
    mainStatus.innerText = '2/4 โหลด AI Model...';
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      loadFaceDatabase();
    } catch (e) { showError('โหลด AI Model ล้มเหลว: ' + e.message); }
  }

  async function loadFaceDatabase() {
    mainStatus.innerText = '3/4 โหลดฐานข้อมูลพนักงาน...';
    try {
      const data = await fetch(API_URL + '?action=getKnownFaces').then(r => r.json());
      if (!data || data.length === 0) return showError('ไม่พบข้อมูลพนักงาน กรุณาลงทะเบียนก่อน');
      knownFaces = data.map(u => ({ name: u.label, descriptor: new Float32Array(u.descriptor) }));
      mainStatus.innerText   = '✅ ระบบพร้อมใช้งาน';
      mainStatus.style.color = '#2e7d32';
      btnStart.style.display = 'inline-block';
    } catch (e) { showError('โหลดฐานข้อมูลล้มเหลว: ' + e.message); }
  }

  function startCamera() {
    btnStart.style.display = 'none';
    mainStatus.innerText   = 'กำลังเปิดกล้อง...';
    mainStatus.style.color = '';
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        mainStatus.innerText   = '✅ กำลังสแกน...';
        mainStatus.style.color = '#2e7d32';
        document.getElementById('scanLine').classList.add('active');
        startScanLoop();
      })
      .catch(err => { showError('เปิดกล้องไม่ได้: ' + err.message); btnStart.style.display = 'inline-block'; });
  }

  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    overlayStatus.innerText = 'มองกล้องเพื่อสแกน';
    overlayStatus.style.background = 'rgba(255,255,255,0.85)';
    overlayStatus.style.color = '#2d4a2d';

    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (detection) {
        const best = findBestMatch(detection.descriptor);
        if (best.distance < MATCH_THRESHOLD) {
          clearInterval(scanInterval);
          document.getElementById('scanLine').classList.remove('active');
          showModal(best);
        } else {
          overlayStatus.innerText = 'ไม่รู้จัก (' + best.distance.toFixed(2) + ')';
          overlayStatus.style.background = 'rgba(198,40,40,0.85)';
          overlayStatus.style.color = 'white';
        }
      }
    }, 500);
  }

  function findBestMatch(queryDesc) {
    let best = { name: 'unknown', distance: 1.0 };
    knownFaces.forEach(u => {
      const d = faceapi.euclideanDistance(queryDesc, u.descriptor);
      if (d < best.distance) best = { name: u.name, distance: d };
    });
    return best;
  }

  function showModal(match) {
    currentMatch = match.name;
    document.getElementById('modalName').innerText = match.name;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modalTime').innerText  = 'เวลาเข้างาน: ' + timeStr + ' น.';
    const pct = ((1 - match.distance) * 100).toFixed(1);
    document.getElementById('modalScore').innerText = 'ความเหมือน: ' + pct + '%';
    confirmModal.style.display = 'flex';
    mainStatus.innerText = 'กรุณายืนยัน...';
  }

  async function confirmAttendance() {
    const btn = document.getElementById('btnConfirm');
    btn.disabled  = true;
    btn.innerText = 'กำลังบันทึก...';
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'logAttendance', name: currentMatch, lat: currentLat, lng: currentLng })
      });
      const data = await res.json();
      alert('✅ ' + (data.message || 'บันทึกเวลาสำเร็จ'));
      window.location.href = 'index.html';
    } catch (e) {
      alert('❌ บันทึกล้มเหลว: ' + e.message);
      btn.disabled  = false;
      btn.innerText = '✅ ยืนยันเข้างาน';
    }
  }

  function cancelAttendance() {
    confirmModal.style.display = 'none';
    currentMatch = null;
    if (scanInterval) clearInterval(scanInterval);
    if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    video.classList.remove('active');
    document.getElementById('scanLine').classList.remove('active');
    mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
    mainStatus.style.color  = '#2e7d32';
    overlayStatus.innerText = 'รอโหลด...';
    overlayStatus.style.background = 'rgba(255,255,255,0.85)';
    overlayStatus.style.color = '#2d4a2d';
    btnStart.style.display  = 'inline-block';
  }

  function showError(msg) {
    mainStatus.innerHTML = '<span style="color:#c62828">❌ ' + msg + '</span>';
  }
  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371, dLat = deg2rad(lat2 - lat1), dLon = deg2rad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function deg2rad(deg) { return deg * Math.PI / 180; }
</script>
</body>
</html>
