<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกเวลาเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    :root {
      --bg-start: #f0f7f0;
      --bg-mid: #e8f4e8;
      --bg-end: #ddeedd;
      --primary: #3a7d44;
      --primary-light: #5a9e64;
      --primary-pale: #d4edda;
      --accent: #8fbc8f;
      --text-dark: #2d4a2d;
      --text-mid: #4a7055;
      --text-light: #7a9e7a;
      --text-muted: #a0b8a0;
      --surface: rgba(255,255,255,0.72);
      --surface-border: rgba(58,125,68,0.14);
      --shadow-soft: 0 4px 24px rgba(58,125,68,0.10);
      --shadow-hover: 0 10px 36px rgba(58,125,68,0.18);
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }
 
    .header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeInDown 0.65s ease both;
    }
 
    .logo-wrap {
      width: 80px; height: 80px;
      background: linear-gradient(145deg, var(--primary), var(--primary-light));
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      margin: 0 auto 18px;
      box-shadow: 0 6px 24px rgba(58,125,68,0.28);
    }
 
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75em;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
 
    .subtitle {
      font-size: 0.84em;
      color: var(--text-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
 
    .api-warning {
      display: none;
      background: #fff8e1;
      border: 1px solid #f6c340;
      border-left: 4px solid #f6c340;
      color: #7a5c00;
      border-radius: 12px;
      padding: 12px 18px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 24px;
      font-size: 0.86em;
    }
    .api-warning a { color: #b07d00; font-weight: 700; text-decoration: none; }
 
    .menu-cards {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
 
    .btn-menu {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      text-decoration: none;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text-dark);
      transition: all 0.3s ease;
      box-shadow: var(--shadow-soft);
      animation: fadeInUp 0.55s ease both;
    }
    .btn-menu:nth-child(1) { animation-delay: 0.1s; }
    .btn-menu:nth-child(2) { animation-delay: 0.2s; }
    .btn-menu:nth-child(3) { animation-delay: 0.3s; }
 
    .btn-menu:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
 
    .btn-register:hover { border-color: rgba(58,125,68,0.35); }
    .btn-scan:hover     { border-color: rgba(90,158,100,0.35); }
    .btn-config:hover   { border-color: rgba(143,188,143,0.4); }
 
    .card-icon {
      width: 52px; height: 52px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .btn-register .card-icon { background: linear-gradient(145deg, #3a7d44, #5a9e64); box-shadow: 0 4px 14px rgba(58,125,68,0.3); }
    .btn-scan     .card-icon { background: linear-gradient(145deg, #5a9e64, #78b578); box-shadow: 0 4px 14px rgba(90,158,100,0.3); }
    .btn-config   .card-icon { background: linear-gradient(145deg, #8fbc8f, #a8cca8); box-shadow: 0 4px 14px rgba(143,188,143,0.35); }
 
    .card-text { flex: 1; text-align: left; }
    .card-title { font-size: 1.02em; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
    .card-desc  { font-size: 0.79em; color: var(--text-light); }
 
    .card-arrow { font-size: 18px; color: var(--text-muted); transition: transform 0.25s, color 0.25s; }
    .btn-menu:hover .card-arrow { transform: translateX(5px); color: var(--primary); }
 
    .footer-note {
      margin-top: 40px;
      font-size: 0.76em;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      animation: fadeIn 1s ease 0.6s both;
    }
 
    @keyframes fadeIn      { from { opacity: 0; }                         to { opacity: 1; } }
    @keyframes fadeInDown  { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp    { from { opacity: 0; transform: translateY(18px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
 
  <div class="header">
    <div class="logo-wrap">🏢</div>
    <h1>ระบบบันทึกเวลาเข้างาน</h1>
    <p class="subtitle">Face Recognition &amp; GPS Attendance</p>
  </div>
 
  <div id="apiWarning" class="api-warning">
    ⚠️ ยังไม่ได้ตั้งค่า API — <a href="config.html">ไปตั้งค่าก่อน</a>
  </div>
 
  <div class="menu-cards">
    <a href="register.html" class="btn-menu btn-register">
      <div class="card-icon">👤</div>
      <div class="card-text">
        <div class="card-title">ลงทะเบียนพนักงาน</div>
        <div class="card-desc">บันทึกข้อมูลใบหน้าใหม่</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
 
    <a href="scan.html" class="btn-menu btn-scan">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">สแกนเข้างาน</div>
        <div class="card-desc">ยืนยันตัวตนด้วยใบหน้า + GPS</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
 
    <a href="config.html" class="btn-menu btn-config">
      <div class="card-icon">⚙️</div>
      <div class="card-text">
        <div class="card-title">ตั้งค่าระบบ</div>
        <div class="card-desc">จัดการ GPS และ API (Admin)</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>
 
  <p class="footer-note">Powered by Face API · Google Apps Script</p>
 
  <script>
    if (!localStorage.getItem('gasApiUrl') && typeof GAS_API_URL === 'undefined') {
      document.getElementById('apiWarning').style.display = 'block';
    }
  </script>
</body>
</html>
